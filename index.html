<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore India</title>
</head>
<body>
    <div class="stars"></div>

<div class="container">
<h1>Welcome to Incredible India</h1>

<a href="slide.html">
<button class="visit-btn">
Visit India's All States
</button>
</a>

</div>
<script>

/* create stars */

const stars=document.querySelector(".stars");

for(let i=0;i<80;i++){

let star=document.createElement("span");
star.classList.add("star");

star.style.left=Math.random()*100+"%";
star.style.top=Math.random()*100+"%";

stars.appendChild(star);

}

</script>

</body>
</html>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:poppins;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:black;
overflow:hidden;
}

/* background stars */

.stars{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
z-index:0;
}

.star{
position:absolute;
width:4px;
height:4px;
background:white;
border-radius:50%;
box-shadow:0 0 10px white,0 0 20px #4facfe;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.3}
to{opacity:1}
}

/* button */

.container{
text-align:center;
z-index:10;
}

h1{
color:white;
font-size:50px;
margin-bottom:30px;
}

.visit-btn{
padding:14px 35px;
font-size:18px;
color:white;
background: linear-gradient(135deg,#4facfe,#00f2fe);
border:none;
border-radius:30px;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 10px rgba(79,172,254,0.7);
}

.visit-btn:hover{
transform:scale(1.08);
box-shadow:0 0 20px rgba(79,172,254,1),
           0 0 40px rgba(0,242,254,0.8);
}
/* mobile */
@media (max-width:600px){

h1{
font-size:28px;
margin-bottom:20px;
text-align:center;
}

.visit-btn{
padding:12px 25px;
font-size:16px;
}

.star{
width:3px;
height:3px;
}

}
/* tablets */
@media (max-width:900px){

h1{
font-size:36px;
}

.visit-btn{
padding:15px 30px;
font-size:18px;
}

}

/* laptops */
@media (max-width:1200px){

h1{
font-size:42px;
}

.visit-btn{
padding:16px 35px;
font-size:20px;
}

}
</style>
